name: 기능 제안
description: 개선 아이디어를 제안합니다
title: '[기능] '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 정의
      description: 어떤 문제를 해결하고 싶나요?
      placeholder: 현재 불편한 점이나 한계를 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결 방법
      description: 무엇을 추가하거나 변경하면 좋을지 작성해 주세요.
      placeholder: 기대하는 동작을 구체적으로 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: 사용 시나리오
      description: 어떤 상황에서 이 기능이 필요했는지 적어 주세요.
      placeholder: 어떤 사용자에게 어떤 흐름에서 도움이 되는지 설명해 주세요.
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      placeholder: 함께 고려했던 다른 방법이 있다면 작성해 주세요.
  - type: textarea
    id: impact
    attributes:
      label: 기대 효과
      description: 누구에게 어떤 이점이 있나요?
      placeholder: 사용자/유지보수자/호환성 관점의 영향을 작성해 주세요.
  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: 기존 이슈를 확인했습니다.
          required: true
