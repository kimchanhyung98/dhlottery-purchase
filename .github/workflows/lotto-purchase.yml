name: 로또 자동 구매 (스케줄)
on:
  schedule:
    # 매주 일요일 UTC 03:00 (한국 시간 일요일 12:00)
    # https://elmah.io/tools/cron-parser/
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  purchase:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.55.1-jammy
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Auto purchase
        uses: ./
        with:
          dhlottery-id: ${{ secrets.DHLOTTERY_ID }}
          dhlottery-password: ${{ secrets.DHLOTTERY_PASSWORD }}
          github-token: ${{ github.token }}
          game-count: '5'
