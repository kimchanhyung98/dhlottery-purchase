name: 'lotto-purchase-action'
description: '동행복권 로또 6/45 자동 구매를 위한 GitHub Action. 자동/수동 구매 및 커스텀 워크플로우를 지원합니다.'
branding:
  icon: 'award'
  color: 'green'
author: 'kkd927<kkd927@gmail.com>'
inputs:
  dhlottery-id:
    required: true
    description: '동행복권 로그인 아이디'
    default: ''
  dhlottery-password:
    required: true
    description: '동행복권 로그인 비밀번호'
    default: ''
  github-token:
    required: false
    description: 'GitHub 이슈 관리를 위한 토큰. workflow에서는 `${{ github.token }}` 사용을 권장합니다.'
    default: ''
  game-count:
    required: false
    description: '자동 구매 게임 수 (1-5, 기본값: 5)'
    default: '5'
  workflow-file:
    required: false
    description: '커스텀 워크플로우 스크립트 경로 (예: ".github/workflows/lotto-workflow.js")'
    default: ''
  telegram-bot-token:
    required: false
    description: '텔레그램 봇 토큰 (optional, 알림용)'
    default: ''
  telegram-chat-id:
    required: false
    description: '텔레그램 채팅 ID (optional, 알림용)'
    default: ''
runs:
  using: 'node24'
  main: 'dist/index.js'
